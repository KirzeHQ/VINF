name: VINF CI

on:
  push:
  pull_request:
  merge_group:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: Check Code Formatting
            run: |
              echo "Checking code formatting with rustfmt..."
              cargo fmt --all -- --check

          - name: Run Clippy Linting
            run: |
              echo "Running Clippy for linting..."
              cargo clippy --all-targets --all-features -- -D warnings

          # None yet
          #- name: Run Unit Tests
          #  run: |
          #    echo "Running unit tests..."
          #    cargo test --lib

          #- name: Run Integration Tests
          #  run: |
          #    echo "Running integration tests..."
          #    cargo test --tests

          #- name: Run Example Tests
          #  run: |
          #    echo "Running example tests..."
          #    cargo test --examples
      
    name: ${{ matrix.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Sys Depends
        run: sudo apt-get install -y build-essential cmake

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.72.0
          components: clippy, rustfmt
          profile: minimal

      - name: Cargo build
        run: cargo build --all

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Matrix
        run: ${{ matrix.run }}
